<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Delete Expense</title>

<style>

body{
background:#f4f6f9;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
width:350px;
text-align:center;
}

input{

width:100%;
padding:12px;
margin:15px 0;
font-size:16px;
}

button{

width:100%;
padding:12px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.error{

color:red;
margin-bottom:10px;
}

a{

display:block;
margin-top:15px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>🔒 Delete Expense</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST" autocomplete="off">

<input
    type="password"
    name="password"
    placeholder="Enter Admin Password"
    required
    autocomplete="new-password"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false">

<button type="submit">
Delete
</button>

</form>

<a href="/">⬅ Back</a>

</div>

</body>
</html>
